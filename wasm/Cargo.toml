[package]
name = "pyana-wasm"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
description = "WebAssembly playground for pyana token primitives"

[lib]
crate-type = ["cdylib"]

[dependencies]
wasm-bindgen = "0.2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde-wasm-bindgen = "0.6"
getrandom = { workspace = true, features = ["wasm_js"] }
getrandom02 = { package = "getrandom", version = "0.2", features = ["js"] }
getrandom04 = { package = "getrandom", version = "0.4", features = ["wasm_js"] }

# Local crates (only WASM-safe ones)
macaroon = { path = "../macaroon" }
pyana-trace = { path = "../trace" }
pyana-commit = { path = "../commit" }
pyana-circuit = { path = "../circuit", default-features = false, features = ["mock"] }
pyana-cell = { path = "../cell" }
pyana-turn = { path = "../turn" }
pyana-coord = { path = "../coord" }
pyana-intent = { path = "../intent" }
pyana-types = { path = "../types" }

# Token crate without biscuit (biscuit-auth has complex deps)
token = { path = "../token", default-features = false, features = ["macaroon", "rand-deps"] }

blake3 = "1"
postcard = { version = "1", features = ["alloc"] }
js-sys = "0.3"

[dependencies.web-sys]
version = "0.3"
features = ["Performance", "Window"]

[lints]
workspace = true
