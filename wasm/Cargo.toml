[package]
name = "pyana-wasm"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
description = "WebAssembly playground for pyana token primitives"

[lib]
crate-type = ["cdylib"]

[dependencies]
wasm-bindgen = "0.2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde-wasm-bindgen = "0.6"
getrandom = { workspace = true, features = ["wasm_js"] }
getrandom02 = { package = "getrandom", version = "0.2", features = ["js"] }
getrandom04 = { package = "getrandom", version = "0.4", features = ["wasm_js"] }

# Local crates (only WASM-safe ones)
pyana-macaroon = { path = "../macaroon" }
pyana-trace = { path = "../trace" }
pyana-commit = { path = "../commit" }
pyana-circuit = { path = "../circuit", default-features = false, features = ["mock"] }
pyana-cell = { path = "../cell", default-features = false }
pyana-turn = { path = "../turn", default-features = false }
pyana-coord = { path = "../coord", default-features = false }
pyana-intent = { path = "../intent", default-features = false }
pyana-sdk = { path = "../sdk", default-features = false }
# sdk pulls bulletproofs (via cell crypto) — already covered by the
# clear_on_drop override below, but listing here for grep-ability.
pyana-types = { path = "../types" }
# Federation (pure types + consensus orchestration). The `runtime` feature
# (tokio + crossbeam transport) is non-wasm32, hence default-features = false.
pyana-federation = { path = "../federation", default-features = false }

# Token crate without biscuit (biscuit-auth has complex deps)
pyana-token = { path = "../token", default-features = false, features = ["macaroon", "rand-deps"] }

blake3 = "1"
postcard = { version = "1", features = ["alloc"] }
js-sys = "0.3"
x25519-dalek = { workspace = true }
zeroize = { workspace = true }
ed25519-dalek = { version = "2", default-features = false, features = ["zeroize"] }

# Indirect dep via bulletproofs (pulled in by pyana-cell when turn/coord/intent
# enable their default crypto feature). clear_on_drop's default build invokes
# a C compiler (build.rs -> cc -> clang --target=wasm32) which has no working
# wasm32 toolchain on most systems. The `no_cc` feature switches it to a pure
# Rust implementation. Declaring it directly here unifies the feature across
# the workspace so wasm-pack succeeds.
clear_on_drop = { version = "0.2", features = ["no_cc"] }
# Indirect dep via `hints` (pulled in by pyana-federation -> hints). Lockstitch
# uses inline x86_64 / aarch64 AES intrinsics unless the `portable` feature is
# enabled. The wasm32 target has neither, so we force `portable` here.
lockstitch = { version = "0.29", features = ["portable"] }

[dependencies.web-sys]
version = "0.3"
features = ["Performance", "Window"]

[lints]
workspace = true
