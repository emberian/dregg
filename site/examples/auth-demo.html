<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pyana Auth Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
    }
    h1 {
      color: #58a6ff;
      margin-bottom: 0.5rem;
      font-size: 1.5rem;
    }
    .subtitle {
      color: #8b949e;
      margin-bottom: 2rem;
      font-size: 0.9rem;
    }
    .container {
      max-width: 640px;
      width: 100%;
    }
    .status-bar {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 1rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #f85149;
      flex-shrink: 0;
    }
    .status-dot.connected { background: #3fb950; }
    .status-dot.checking { background: #d29922; }
    .status-text {
      font-size: 0.85rem;
      color: #8b949e;
    }
    .actions {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    button {
      background: #21262d;
      border: 1px solid #30363d;
      color: #c9d1d9;
      padding: 0.75rem 1.25rem;
      border-radius: 6px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      font-family: inherit;
    }
    button:hover {
      background: #30363d;
      border-color: #58a6ff;
    }
    button:active {
      background: #388bfd26;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    button.primary {
      background: #1f6feb;
      border-color: #1f6feb;
      color: #fff;
    }
    button.primary:hover {
      background: #388bfd;
      border-color: #388bfd;
    }
    .result-panel {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 1rem;
      min-height: 200px;
      font-size: 0.8rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-all;
      overflow-y: auto;
      max-height: 400px;
    }
    .result-panel .line {
      margin-bottom: 0.25rem;
    }
    .result-panel .label {
      color: #8b949e;
    }
    .result-panel .value {
      color: #c9d1d9;
    }
    .result-panel .success {
      color: #3fb950;
    }
    .result-panel .error {
      color: #f85149;
    }
    .result-panel .info {
      color: #58a6ff;
    }
    .result-panel .timing {
      color: #d29922;
    }
    .footer {
      margin-top: 2rem;
      color: #484f58;
      font-size: 0.75rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Pyana Auth Demo</h1>
    <p class="subtitle">Browser extension wallet authorization flow</p>

    <div class="status-bar">
      <div class="status-dot" id="statusDot"></div>
      <span class="status-text" id="statusText">Checking extension...</span>
    </div>

    <div class="actions">
      <button id="btnProvision" onclick="provisionDemoToken()">
        Get Demo Token
      </button>
      <button class="primary" id="btnAuth" onclick="requestAccess()">
        Request Access
      </button>
      <button id="btnCheck" onclick="checkConnection()">
        Check Connection
      </button>
      <button id="btnCanAuth" onclick="checkCanAuthorize()">
        Can Authorize?
      </button>
    </div>

    <div class="result-panel" id="results">
      <span class="label">Waiting for action...</span>
    </div>

    <p class="footer">
      pyana.dev &middot; Zero-knowledge authorization for the web
    </p>
  </div>

  <script>
    // ─── Extension Detection ──────────────────────────────────────────────────

    function isExtensionAvailable() {
      return typeof window.pyana !== 'undefined';
    }

    function updateStatus() {
      const dot = document.getElementById('statusDot');
      const text = document.getElementById('statusText');

      if (isExtensionAvailable()) {
        dot.className = 'status-dot connected';
        text.textContent = 'Extension connected';
      } else {
        dot.className = 'status-dot';
        text.textContent = 'Extension not installed';
      }
    }

    // ─── Result Display ───────────────────────────────────────────────────────

    function clearResults() {
      document.getElementById('results').innerHTML = '';
    }

    function appendResult(html) {
      const panel = document.getElementById('results');
      const line = document.createElement('div');
      line.className = 'line';
      line.innerHTML = html;
      panel.appendChild(line);
      panel.scrollTop = panel.scrollHeight;
    }

    function log(msg) {
      appendResult('<span class="value">' + escapeHtml(msg) + '</span>');
    }

    function logLabel(label, value) {
      appendResult(
        '<span class="label">' + escapeHtml(label) + ': </span>' +
        '<span class="value">' + escapeHtml(value) + '</span>'
      );
    }

    function logSuccess(msg) {
      appendResult('<span class="success">' + escapeHtml(msg) + '</span>');
    }

    function logError(msg) {
      appendResult('<span class="error">' + escapeHtml(msg) + '</span>');
    }

    function logInfo(msg) {
      appendResult('<span class="info">' + escapeHtml(msg) + '</span>');
    }

    function logTiming(label, ms) {
      appendResult(
        '<span class="label">' + escapeHtml(label) + ': </span>' +
        '<span class="timing">' + ms.toFixed(2) + 'ms</span>'
      );
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ─── Actions ──────────────────────────────────────────────────────────────

    async function provisionDemoToken() {
      clearResults();
      logInfo('--- Provision Demo Token ---');
      log('');

      if (!isExtensionAvailable()) {
        logError('Extension not installed.');
        logInfo('Install the Pyana extension first, then click this button.');
        return;
      }

      if (!window.pyana.provision) {
        logError('Extension does not support provisioning (update extension).');
        return;
      }

      const demoToken = {
        actions: ['read', 'write', 'list'],
        resource: '/demo',
        issuer: 'pyana-web-demo',
        expiry: Date.now() + (24 * 60 * 60 * 1000), // 24 hours
      };

      logLabel('Token', JSON.stringify(demoToken, null, 2));
      log('');
      logInfo('Calling window.pyana.provision()...');
      logInfo('(The extension will ask you to confirm)');

      const start = performance.now();
      try {
        const result = await window.pyana.provision(demoToken);
        const elapsed = performance.now() - start;
        log('');
        if (result.accepted) {
          logSuccess('Token provisioned into wallet');
          if (result.tokenId) logLabel('Token ID', result.tokenId);
        } else {
          logError('Token rejected by user');
        }
        logTiming('Time', elapsed);
      } catch (err) {
        logError('Provisioning failed: ' + err.message);
      }
    }

    async function requestAccess() {
      clearResults();
      logInfo('--- Request Access ---');
      log('');

      if (!isExtensionAvailable()) {
        logError('Extension not installed.');
        logInfo('Install the Pyana browser extension to use this demo.');
        logInfo('The extension injects window.pyana into the page.');
        return;
      }

      const request = { action: 'read', resource: '/demo' };
      logLabel('Request', JSON.stringify(request));
      log('');
      logInfo('Calling window.pyana.authorize()...');

      const start = performance.now();

      try {
        const result = await window.pyana.authorize(request);
        const elapsed = performance.now() - start;

        log('');
        logSuccess('Authorization result received');
        logLabel('Authorized', String(result.authorized));
        if (result.proofSize !== undefined) {
          logLabel('Proof size', result.proofSize + ' bytes');
        }
        if (result.mode !== undefined) {
          logLabel('Mode', result.mode);
        }
        logTiming('Round-trip time', elapsed);
      } catch (err) {
        const elapsed = performance.now() - start;
        log('');
        logError('Authorization failed: ' + err.message);
        logTiming('Time to failure', elapsed);
      }
    }

    async function checkConnection() {
      clearResults();
      logInfo('--- Check Connection ---');
      log('');

      if (!isExtensionAvailable()) {
        logError('Extension not installed.');
        logInfo('window.pyana is undefined.');
        logInfo('');
        logInfo('Expected API surface:');
        log('  window.pyana.authorize(request)     - Request authorization');
        log('  window.pyana.isConnected()          - Check wallet connection');
        log('  window.pyana.canAuthorize(request)  - Dry-run authorization check');
        return;
      }

      logInfo('Calling window.pyana.isConnected()...');

      const start = performance.now();
      try {
        const connected = await window.pyana.isConnected();
        const elapsed = performance.now() - start;

        log('');
        if (connected) {
          logSuccess('Wallet is connected');
        } else {
          logError('Wallet is not connected (locked or no identity loaded)');
        }
        logTiming('Response time', elapsed);
      } catch (err) {
        logError('Error: ' + err.message);
      }
    }

    async function checkCanAuthorize() {
      clearResults();
      logInfo('--- Can Authorize? ---');
      log('');

      if (!isExtensionAvailable()) {
        logError('Extension not installed.');
        logInfo('Cannot check authorization without the extension.');
        return;
      }

      const request = { action: 'read', resource: '/demo' };
      logLabel('Request', JSON.stringify(request));
      log('');
      logInfo('Calling window.pyana.canAuthorize()...');

      const start = performance.now();
      try {
        const result = await window.pyana.canAuthorize(request);
        const elapsed = performance.now() - start;

        log('');
        if (result) {
          logSuccess('Yes -- wallet holds a matching capability');
        } else {
          logError('No -- no matching capability found');
        }
        logLabel('Can authorize', String(result));
        logTiming('Response time', elapsed);
      } catch (err) {
        logError('Error: ' + err.message);
      }
    }

    // ─── Init ─────────────────────────────────────────────────────────────────

    updateStatus();

    // Re-check after a short delay (extension may inject after DOMContentLoaded)
    setTimeout(updateStatus, 500);
    setTimeout(updateStatus, 2000);
  </script>
</body>
</html>
