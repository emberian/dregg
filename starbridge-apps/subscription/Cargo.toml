[package]
name = "starbridge-subscription"
version = "0.1.0"
edition = "2024"
description = "Starbridge userspace subscription — CapInbox-as-cell-program. The proof-of-pattern for STORAGE-AS-CELL-PROGRAMS.md §3.1: a publisher/consumer message queue whose invariants (monotonic head/tail, WriteOnce message slots, publisher/consumer SenderAuthorized sets) are baked into a FactoryDescriptor and enforced by the executor on every turn — not by an operator-side enforcement loop."

# Greenfield rebuild of `apps/subscription/`'s storage-layer surface as
# a starbridge-app, following STORAGE-AS-CELL-PROGRAMS.md §3.1.
#
# This crate is the FIRST app that exercises the CapInbox -> cell-program
# migration. It mirrors `starbridge-apps/nameservice/`'s shape:
# FactoryDescriptor + turn-builders + Effect-only composition. No new
# Effect variants; no operator-side storage enforcement.
#
# See `src/lib.rs` for the in-source design notes, the
# `subscription_factory_descriptor()` slot layout, and the operation-scoped
# `CellProgram::Cases(_)` that wires publish vs consume to disjoint
# `MonotonicSequence` constraints (publish advances head only, consume
# advances tail only).

[lib]
name = "starbridge_subscription"

[dependencies]
pyana-app-framework = { path = "../../app-framework" }
pyana-cell = { path = "../../cell", default-features = false }
pyana-types = { path = "../../types" }

blake3 = "1"
serde = { workspace = true }
serde_json = { workspace = true }

[lints]
workspace = true
