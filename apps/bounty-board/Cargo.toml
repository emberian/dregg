[package]
name = "pyana-bounty-board"
version = "0.1.0"
edition = "2024"

[dependencies]
pyana-app-framework = { path = "../../app-framework" }
pyana-circuit = { path = "../../circuit", default-features = false, features = ["mock"] }
pyana-storage = { path = "../../storage" }
pyana-turn = { path = "../../turn" }
pyana-sdk = { path = "../../sdk" }

serde = { workspace = true }
serde_json = { workspace = true }
postcard = { version = "1", features = ["use-std"] }
tokio = { version = "1", features = ["full"] }
axum = "0.8"
axum-extra = { version = "0.10", features = ["typed-header"] }
clap = { version = "4", features = ["derive", "env"] }
tracing = "0.1"
tracing-subscriber = "0.3"
blake3 = "1"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }

[[example]]
name = "devnet_demo"
path = "examples/devnet_demo.rs"

[lints]
workspace = true
