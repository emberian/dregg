[package]
name = "pyana-bounty-board"
version = "0.1.0"
edition = "2024"

[dependencies]
pyana-types = { path = "../../types" }
pyana-cell = { path = "../../cell" }
pyana-turn = { path = "../../turn" }
pyana-sdk = { path = "../../sdk" }
pyana-intent = { path = "../../intent" }
token = { path = "../../token", default-features = false, features = ["macaroon", "datalog"] }
pyana-circuit = { path = "../../circuit" }
pyana-store = { path = "../../store" }

serde = { workspace = true }
serde_json = { workspace = true }
tokio = { version = "1", features = ["full"] }
axum = "0.8"
tracing = "0.1"
tracing-subscriber = "0.3"
blake3 = "1"

[lints]
workspace = true
