[package]
name = "pyana-identity"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Decentralized identity and verifiable credentials using pyana ZK proofs"

[dependencies]
pyana-circuit = { path = "../../circuit", default-features = false, features = ["mock"] }
pyana-dsl-runtime = { path = "../../pyana-dsl-runtime" }
pyana-dsl-tests = { path = "../../pyana-dsl-tests" }
pyana-app-framework = { path = "../../app-framework" }

serde = { workspace = true }
serde_json = { workspace = true }
blake3 = "1"
tokio = { version = "1", features = ["full"] }
axum = "0.8"
tower = "0.5"
pyana-storage = { path = "../../storage" }

[[bin]]
name = "pyana-identity"
path = "src/bin/pyana_identity.rs"

[lints]
workspace = true

[[example]]
name = "kyc_demo"
path = "examples/kyc_demo.rs"
