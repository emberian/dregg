[package]
name = "pyana-subscription"
version = "0.1.0"
edition = "2024"
description = "Subscription Service: store-and-forward content delivery, delegated auto-debit, credential-gated tiers"

[dependencies]
pyana-app-framework = { path = "../../app-framework" }
pyana-sdk = { path = "../../sdk" }
pyana-storage = { path = "../../storage" }
pyana-token = { path = "../../token" }
pyana-types = { path = "../../types" }

serde = { workspace = true }
serde_json = { workspace = true }
blake3 = "1"
getrandom = { workspace = true }
chacha20poly1305 = { workspace = true }
x25519-dalek = { workspace = true }
ed25519-dalek = { version = "2", features = ["std"] }
zeroize = { workspace = true }
tokio = { version = "1", features = ["full"] }
axum = "0.8"
thiserror = { workspace = true }

[[bin]]
name = "pyana-subscription"
path = "src/bin/pyana_subscription.rs"

[lints]
workspace = true
