[package]
name = "pyana-privacy-voting"
version = "0.1.0"
edition = "2024"

[dependencies]
pyana-app-framework = { path = "../../app-framework" }
pyana-storage = { path = "../../storage" }
pyana-sdk = { path = "../../sdk" }
pyana-types = { path = "../../types" }
pyana-turn = { path = "../../turn" }
pyana-cell = { path = "../../cell", default-features = false }
pyana-token = { path = "../../token" }

serde = { workspace = true }
serde_json = { workspace = true }
blake3 = "1"
ed25519-dalek = { version = "2", features = ["std"] }
thiserror = { workspace = true }
tokio = { version = "1", features = ["full"] }
axum = "0.8"

[dev-dependencies]
tower = "0.5"
http-body-util = "0.1"

[[bin]]
name = "pyana-privacy-voting"
path = "src/bin/pyana_privacy_voting.rs"

[lints]
workspace = true
