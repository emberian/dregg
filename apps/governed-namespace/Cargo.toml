[package]
name = "governed-namespace"
version = "0.1.0"
edition = "2024"
description = "DAO-controlled file hosting with DFA-governed routing and capability-secure storage"

[dependencies]
pyana-types = { path = "../../types" }
pyana-cell = { path = "../../cell", default-features = false }
pyana-captp = { path = "../../captp" }
pyana-app-framework = { path = "../../app-framework" }
pyana-dfa = { path = "../../dfa" }

blake3 = "1"
serde = { workspace = true }
serde_json = { workspace = true }
postcard = { version = "1", features = ["use-std"] }
axum = "0.8"
tokio = { version = "1", features = ["full"] }

[dev-dependencies]
tower = "0.5"

[lints]
workspace = true
