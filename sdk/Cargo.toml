[package]
name = "pyana-sdk"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Agent SDK and wallet for the pyana federation — token management, turn execution, and proof generation"

[dependencies]
pyana-types = { path = "../types" }
pyana-cell = { path = "../cell" }
pyana-turn = { path = "../turn" }
pyana-bridge = { path = "../bridge" }
# `network` feature: tokio + pyana-wire — non-wasm32 (mio, quinn). Wasm
# consumers set `default-features = false`; the modules that depend on
# these (client, embed, discharge, discovery) are `#[cfg]`-gated.
pyana-wire = { path = "../wire", optional = true }
# `captp` feature: pyana-captp pulls async runtimes that are non-wasm32.
# captp_client + names are gated on this.
pyana-captp = { path = "../captp", optional = true }
pyana-circuit = { path = "../circuit" }
pyana-commit = { path = "../commit" }
pyana-dsl-runtime = { path = "../pyana-dsl-runtime" }
pyana-dsl-tests = { path = "../pyana-dsl-tests" }
pyana-intent = { path = "../intent" }
pyana-macaroon = { workspace = true, features = ["crypto"] }
pyana-token = { path = "../token", default-features = false, features = ["macaroon", "rand-deps"] }
pyana-trace = { path = "../trace" }

async-trait = "0.1"
base64 = { workspace = true }
blake3 = "1"
curve25519-dalek = { version = "4", features = ["alloc"] }
ed25519-dalek = { version = "2", features = ["std"] }
getrandom = { workspace = true }
hmac = { workspace = true }
pbkdf2 = "0.12"
postcard = { version = "1", features = ["use-std"] }
rmp-serde = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
sha2 = { workspace = true }
thiserror = { workspace = true }
reqwest = { version = "0.12", features = ["json"], optional = true }
tokio = { version = "1", features = ["full"], optional = true }
tracing = "0.1"
zeroize = { workspace = true }

[features]
# Native default keeps full networking surface — backward-compatible. Wasm
# consumers (and any embedded callers that only want the wallet/runtime)
# pass `default-features = false`.
default = ["federation-client", "network", "captp"]
federation-client = ["dep:reqwest"]
network = ["dep:pyana-wire", "dep:tokio"]
captp = ["dep:pyana-captp"]
dev = ["pyana-circuit/dev"]
# Enables `DelegationAuthority::Open`, which accepts any well-signed envelope
# without an authority check. This is a footgun in production and is gated
# behind a feature flag so that production builds cannot construct it at all.
# Only enable in tests or development binaries — never in production-facing
# crates.
unsafe-test-utils = []

[[example]]
name = "agent_demo"
path = "examples/agent_demo.rs"

[lints]
workspace = true
