[package]
name = "pyana-sdk"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Agent SDK and wallet for the pyana federation — token management, turn execution, and proof generation"

[dependencies]
pyana-types = { path = "../types" }
pyana-cell = { path = "../cell" }
pyana-turn = { path = "../turn" }
pyana-bridge = { path = "../bridge" }
pyana-circuit = { path = "../circuit" }
pyana-commit = { path = "../commit" }
pyana-intent = { path = "../intent" }
pyana-wire = { path = "../wire" }
macaroon = { workspace = true, features = ["crypto"] }
token = { path = "../token", default-features = false, features = ["macaroon", "rand-deps"] }
pyana-trace = { path = "../trace" }

async-trait = "0.1"
base64 = { workspace = true }
blake3 = "1"
ed25519-dalek = { version = "2", features = ["std"] }
getrandom = { workspace = true }
hmac = { workspace = true }
pbkdf2 = "0.12"
postcard = { version = "1", features = ["use-std"] }
serde = { workspace = true }
serde_json = { workspace = true }
sha2 = { workspace = true }
thiserror = { workspace = true }
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
zeroize = { workspace = true }

[features]
default = []
dev = ["pyana-circuit/dev"]

[[example]]
name = "agent_demo"
path = "examples/agent_demo.rs"

[lints]
workspace = true
