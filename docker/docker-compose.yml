version: '3.8'

services:
  node-0:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: run --data-dir /data --bind 0.0.0.0 --port 8420 --gossip-port 9420 --key-file node-0.key --morpheus --node-index 0 --federation-size 3 --federation-peers node-1:9420,node-2:9420 --enable-pruning --enable-faucet
    volumes:
      - node0-data:/data
      - ./devnet-config/node-0.key:/data/node-0.key:ro
      - ./devnet-config/genesis.json:/data/genesis.json:ro
      - ./devnet-config/.devnet:/data/.devnet:ro
    ports:
      - "8420:8420"
      - "9420:9420"
    environment:
      - RUST_LOG=info
    networks:
      - devnet

  node-1:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: run --data-dir /data --bind 0.0.0.0 --port 8420 --gossip-port 9420 --key-file node-1.key --morpheus --node-index 1 --federation-size 3 --federation-peers node-0:9420,node-2:9420
    volumes:
      - node1-data:/data
      - ./devnet-config/node-1.key:/data/node-1.key:ro
      - ./devnet-config/genesis.json:/data/genesis.json:ro
      - ./devnet-config/.devnet:/data/.devnet:ro
    ports:
      - "8421:8420"
      - "9421:9420"
    environment:
      - RUST_LOG=info
    networks:
      - devnet

  node-2:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: run --data-dir /data --bind 0.0.0.0 --port 8420 --gossip-port 9420 --key-file node-2.key --morpheus --node-index 2 --federation-size 3 --federation-peers node-0:9420,node-1:9420
    volumes:
      - node2-data:/data
      - ./devnet-config/node-2.key:/data/node-2.key:ro
      - ./devnet-config/genesis.json:/data/genesis.json:ro
      - ./devnet-config/.devnet:/data/.devnet:ro
    ports:
      - "8422:8420"
      - "9422:9420"
    environment:
      - RUST_LOG=info
    networks:
      - devnet

  explorer:
    image: nginx:alpine
    volumes:
      - ../site/explorer:/usr/share/nginx/html:ro
    ports:
      - "3000:80"
    networks:
      - devnet

volumes:
  node0-data:
  node1-data:
  node2-data:

networks:
  devnet:
    driver: bridge
