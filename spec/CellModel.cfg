\* TLC configuration for CellModel.tla — the smallest reasonable model.
\*
\* Two public keys, one token id => up to 2 derivable CellIds.
\* MaxNonce = 2, MaxTurns = 2 keeps the state space tractable while still
\* covering both successful and rejected turns, transfer + nop turns, and
\* receipt chains of non-trivial length.
\*
\* MaxBalance = 2 and InitialEndowment = 2 give just enough room for a
\* couple of value-bearing turns (one transfer drains the holder; a fee
\* burn can be exercised by setting amount=1, fee=1).

SPECIFICATION Spec

CONSTANTS
    PublicKeys       = { pk1, pk2 }
    TokenIds         = { tA }
    MaxNonce         = 2
    MaxTurns         = 2
    MaxBalance       = 2
    InitialEndowment = 2

INVARIANT
    Invariant

PROPERTY
    MonotonicNonce
    NoAmplificationProperty
    TurnConservesBalanceProperty
    ReceiptChainAppendOnlyProperty
    TurnAppendsOneReceiptProperty

\* State constraint: keep the c-list bounded so TLC doesn't explore an
\* unboundedly growing set of caps.  This bounds |caps| <= 3, |cells| <= 2,
\* and per-chain length <= MaxTurns, which is plenty to exercise grant /
\* redelegate / revoke transitions and the receipt-chain linkage rule.
CONSTRAINT
    StateBound
