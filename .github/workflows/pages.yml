name: Deploy Pyana site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "wasm/**"
      - "paper/**"
      - "extension/**"
      - ".github/workflows/pages.yml"
  workflow_run:
    # Re-deploy whenever demos.yml finishes so the site picks up fresh
    # site/demos/results.json. demos.yml itself does not deploy.
    workflows: ["Run demos and publish results"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          key: wasm

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM
        # Output must match the path imported by the playground/sandbox
        # (../pkg/pyana_wasm.js). The build script copies site/pkg/ verbatim
        # into dist/pkg/. (Was ../site/demo/pkg, which nothing imported.)
        #
        # Known-fragile: pyana-cell's default crypto feature pulls bulletproofs
        # -> clear_on_drop whose build.rs can't target wasm32. If this step
        # fails, the deploy will fall back to a committed site/pkg/ if one
        # exists, otherwise the playground will be WASM-less. See commit
        # 89f8e693 for the deferred remediation plan.
        run: wasm-pack build wasm --target web --out-dir ../site/pkg
        continue-on-error: true

      - name: Build extension WASM
        run: wasm-pack build wasm --target web --out-dir ../extension/pkg --no-typescript
        continue-on-error: true

      - name: Package extension
        run: |
          mkdir -p site/extension
          cd extension
          if [ -d pkg ]; then
            zip -r ../site/extension/pyana-wallet.zip \
              manifest.json background.js content.js page.js \
              popup.html popup-script.js provision.html provision.js \
              recovery.html recovery.js confirm-intent.html origin-permission.html \
              bip39_english.txt pkg/
          else
            zip -r ../site/extension/pyana-wallet.zip \
              manifest.json background.js content.js page.js \
              popup.html popup-script.js provision.html provision.js \
              recovery.html recovery.js confirm-intent.html origin-permission.html \
              bip39_english.txt
          fi

      - name: Fetch latest demo results from demos.yml
        # Pulls the most recent successful demo-results artifact from the
        # demos.yml workflow on main and drops it at site/demos/results.json.
        # If no successful run exists yet (first deploy after the split), the
        # step is a no-op and the site simply ships without results.
        env:
          GH_TOKEN: ${{ github.token }}
        continue-on-error: true
        run: |
          set -euo pipefail
          mkdir -p site/demos
          RUN_ID=$(gh run list \
            --workflow=demos.yml \
            --branch=main \
            --status=success \
            --limit=1 \
            --json databaseId \
            --jq '.[0].databaseId' || true)
          if [ -z "${RUN_ID:-}" ] || [ "$RUN_ID" = "null" ]; then
            echo "No successful demos.yml run found; skipping."
            exit 0
          fi
          echo "Downloading demo-results from run $RUN_ID..."
          gh run download "$RUN_ID" \
            --name demo-results \
            --dir site/demos/ \
            || echo "Artifact download failed (may have expired); skipping."
          ls -la site/demos/ || true

      - name: Install typst
        run: |
          curl -fsSL https://github.com/typst/typst/releases/latest/download/typst-x86_64-unknown-linux-musl.tar.xz | tar xJ
          sudo mv typst-x86_64-unknown-linux-musl/typst /usr/local/bin/

      - name: Build paper PDF
        continue-on-error: true
        run: |
          mkdir -p site/paper
          typst compile paper/pyana.typ site/paper/pyana.pdf

      - name: Build site
        # BASE_PATH rewrites absolute hrefs/srcs so the site works under
        # GitHub Pages' /pyana/ subpath. Drop to "" if a custom domain (CNAME)
        # is configured for emberian.github.io/pyana later.
        env:
          BASE_PATH: /pyana
        run: |
          cd site
          npm install
          npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
