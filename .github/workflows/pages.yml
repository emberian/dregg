name: Deploy Pyana site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "wasm/**"
      - "paper/**"
      - "extension/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          key: wasm

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM
        run: wasm-pack build wasm --target web --out-dir ../site/demo/pkg
        continue-on-error: true

      - name: Build extension WASM
        run: wasm-pack build wasm --target web --out-dir ../extension/pkg --no-typescript
        continue-on-error: true

      - name: Package extension
        run: |
          mkdir -p site/extension
          cd extension
          if [ -d pkg ]; then
            zip -r ../site/extension/pyana-wallet.zip \
              manifest.json background.js content.js page.js \
              popup.html popup-script.js provision.html provision.js \
              recovery.html recovery.js confirm-intent.html origin-permission.html \
              bip39_english.txt pkg/
          else
            zip -r ../site/extension/pyana-wallet.zip \
              manifest.json background.js content.js page.js \
              popup.html popup-script.js provision.html provision.js \
              recovery.html recovery.js confirm-intent.html origin-permission.html \
              bip39_english.txt
          fi

      - name: Install typst
        run: |
          curl -fsSL https://github.com/typst/typst/releases/latest/download/typst-x86_64-unknown-linux-musl.tar.xz | tar xJ
          sudo mv typst-x86_64-unknown-linux-musl/typst /usr/local/bin/

      - name: Build paper PDF
        continue-on-error: true
        run: |
          mkdir -p site/paper
          typst compile paper/pyana.typ site/paper/pyana.pdf

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
