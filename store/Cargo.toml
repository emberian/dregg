[package]
name = "pyana-store"
version = "0.1.0"
edition = "2024"
rust-version = "1.94.0"
authors = ["Pyana Contributors"]
license = "MIT OR Apache-2.0"
description = "Persistent storage backend for pyana token chains, federation state, and audit logs"

[features]
default = ["audit-bridge"]
audit-bridge = ["pyana-audit"]

[dependencies]
redb = "2"
serde = { version = "1", features = ["derive"] }
postcard = { version = "1", features = ["use-std"] }
blake3 = "1"
getrandom = { workspace = true }
pyana-types = { path = "../types" }
pyana-commit = { path = "../commit" }
pyana-cell = { path = "../cell" }
pyana-circuit = { path = "../circuit" }
pyana-audit = { path = "../audit", optional = true }

[dev-dependencies]
tempfile = "3"

[lib]
name = "pyana_store"
crate-type = ["rlib"]

[lints]
workspace = true
