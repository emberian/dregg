<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>dregg - Provision Token</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 100%;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 24px;
      display: flex;
      flex-direction: column;
    }
    h1 {
      font-size: 18px;
      margin-bottom: 8px;
      color: #a78bfa;
    }
    .subtitle {
      font-size: 13px;
      color: #9ca3af;
      margin-bottom: 24px;
    }
    .token-details {
      background: #16213e;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 24px;
      flex: 1;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 8px 0;
      border-bottom: 1px solid #2a2a4a;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #9ca3af;
      min-width: 80px;
    }
    .detail-value {
      font-size: 13px;
      color: #e0e0e0;
      text-align: right;
      word-break: break-all;
    }
    .detail-value.actions {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      justify-content: flex-end;
    }
    .action-tag {
      background: #2d1b69;
      color: #a78bfa;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }
    .warning {
      background: #3b1f1f;
      border: 1px solid #7f1d1d;
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 24px;
      font-size: 12px;
      color: #fca5a5;
    }
    .buttons {
      display: flex;
      gap: 12px;
    }
    button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    #acceptBtn {
      background: #4ade80;
      color: #1a1a2e;
    }
    #acceptBtn:hover { background: #22c55e; }
    #rejectBtn {
      background: #374151;
      color: #e0e0e0;
    }
    #rejectBtn:hover { background: #4b5563; }
    .expired {
      color: #f87171;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <h1>Token Provisioning</h1>
  <p class="subtitle">A site wants to add a capability token to your cipherclerk.</p>

  <div class="token-details" id="details">
    <div class="detail-row">
      <span class="detail-label">Issuer</span>
      <span class="detail-value" id="issuer">Unknown</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Resource</span>
      <span class="detail-value" id="resource">*</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Actions</span>
      <span class="detail-value actions" id="actions"></span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Expiry</span>
      <span class="detail-value" id="expiry">Never</span>
    </div>
  </div>

  <div class="warning" id="warning" style="display:none;"></div>

  <div class="buttons">
    <button id="rejectBtn">Reject</button>
    <button id="acceptBtn">Accept</button>
  </div>

  <script src="provision.js"></script>
</body>
</html>
