<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pyana - Origin Permission</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 100%;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 24px;
      display: flex;
      flex-direction: column;
    }
    h1 {
      font-size: 18px;
      margin-bottom: 8px;
      color: #a78bfa;
    }
    .subtitle {
      font-size: 13px;
      color: #9ca3af;
      margin-bottom: 24px;
    }
    .details {
      background: #16213e;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 24px;
      flex: 1;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 8px 0;
      border-bottom: 1px solid #2a2a4a;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #9ca3af;
      min-width: 80px;
    }
    .detail-value {
      font-size: 13px;
      color: #e0e0e0;
      text-align: right;
      word-break: break-all;
    }
    .origin-highlight {
      color: #fbbf24;
      font-weight: 600;
    }
    .warning {
      background: #3b1f1f;
      border: 1px solid #7f1d1d;
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 24px;
      font-size: 12px;
      color: #fca5a5;
    }
    .buttons {
      display: flex;
      gap: 12px;
    }
    button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    #allowBtn {
      background: #4ade80;
      color: #1a1a2e;
    }
    #allowBtn:hover { background: #22c55e; }
    #denyBtn {
      background: #374151;
      color: #e0e0e0;
    }
    #denyBtn:hover { background: #4b5563; }
  </style>
</head>
<body>
  <h1>Origin Permission</h1>
  <p class="subtitle">A website is requesting access to your Pyana wallet.</p>

  <div class="details">
    <div class="detail-row">
      <span class="detail-label">Origin</span>
      <span class="detail-value origin-highlight" id="origin">--</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Method</span>
      <span class="detail-value" id="method">--</span>
    </div>
  </div>

  <div class="warning">
    Granting access allows this origin to call the specified Pyana API method.
    Only allow origins you trust.
  </div>

  <div class="buttons">
    <button id="denyBtn">Deny</button>
    <button id="allowBtn">Allow</button>
  </div>

  <script>
    function escapeHtml(str) {
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    const params = new URLSearchParams(window.location.search);
    const origin = params.get('origin') || 'unknown';
    const method = params.get('method') || 'unknown';

    document.getElementById('origin').textContent = origin;
    document.getElementById('method').textContent = method;

    document.getElementById('allowBtn').addEventListener('click', () => {
      chrome.runtime.sendMessage({
        type: 'pyana:originPermissionDecision',
        granted: true,
        origin,
      });
      window.close();
    });

    document.getElementById('denyBtn').addEventListener('click', () => {
      chrome.runtime.sendMessage({
        type: 'pyana:originPermissionDecision',
        granted: false,
        origin,
      });
      window.close();
    });

    window.addEventListener('beforeunload', () => {
      chrome.runtime.sendMessage({
        type: 'pyana:originPermissionDecision',
        granted: false,
        origin,
      });
    });
  </script>
</body>
</html>
