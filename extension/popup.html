<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pyana Wallet</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      min-height: 400px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 16px;
    }
    h1 { font-size: 18px; margin-bottom: 16px; color: #a78bfa; }
    .status {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 16px; padding: 8px 12px;
      background: #16213e; border-radius: 8px;
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%; background: #4ade80;
    }
    .status-dot.locked { background: #f87171; }
    .section { margin-bottom: 16px; }
    .section-title {
      font-size: 12px; text-transform: uppercase;
      letter-spacing: 0.05em; color: #9ca3af; margin-bottom: 8px;
    }
    .stat {
      padding: 8px 12px; background: #16213e;
      border-radius: 6px; margin-bottom: 4px;
      display: flex; justify-content: space-between;
    }
    .stat-value { color: #a78bfa; font-weight: 600; }
    .log-entry {
      padding: 6px 12px; background: #16213e;
      border-radius: 6px; margin-bottom: 4px; font-size: 12px;
    }
    .log-entry .time { color: #6b7280; font-size: 10px; }
    button {
      width: 100%; padding: 10px; border: none;
      border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer;
    }
    #lockBtn { background: #a78bfa; color: #1a1a2e; }
    #lockBtn:hover { background: #8b5cf6; }
    #lockBtn.locked { background: #4ade80; }
    .empty { color: #6b7280; font-size: 12px; padding: 8px 0; }
  </style>
</head>
<body>
  <h1>Pyana Wallet</h1>
  <div class="status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Connected</span>
  </div>
  <div class="section">
    <div class="section-title">Tokens</div>
    <div class="stat">
      <span>Active tokens</span>
      <span class="stat-value" id="tokenCount">0</span>
    </div>
    <div class="stat">
      <span>Receipt chain</span>
      <span class="stat-value" id="chainLength">0</span>
    </div>
  </div>
  <div class="section">
    <div class="section-title">Recent Authorizations</div>
    <div id="logContainer">
      <div class="empty">No recent authorizations</div>
    </div>
  </div>
  <button id="lockBtn">Lock Wallet</button>
  <script src="popup-script.js"></script>
</body>
</html>
