[package]
name = "dregg-tests"
version.workspace = true
edition.workspace = true
autobins = false

[lib]
name = "dregg_tests"
path = "src/main.rs"

[features]
# `dregg-bridge` consumption is gated to the legacy/WIP test modules.
# When those features are enabled, the dependency is required; the default
# build skips it so the workspace stays buildable while bridge undergoes
# token-vocabulary changes.
default = []
__legacy_tests = ["dep:dregg-bridge"]
__wip_tests = ["dep:dregg-bridge"]

[dependencies]
dregg-circuit = { path = "../circuit" }
dregg-commit = { path = "../commit" }
dregg-turn = { path = "../turn" }
dregg-cell = { path = "../cell" }
dregg-sdk = { path = "../sdk" }
dregg-types = { path = "../types" }
dregg-verifier = { path = "../verifier" }
dregg-bridge = { path = "../bridge", optional = true }
dregg-dsl-runtime = { path = "../dregg-dsl-runtime" }
dregg-token = { path = "../token", default-features = false, features = ["macaroon", "rand-deps"] }
blake3 = "1"
getrandom = { workspace = true }
postcard = { version = "1", features = ["use-std"] }
proptest = { workspace = true }

[lints]
workspace = true
