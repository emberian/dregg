[package]
name = "pyana-tests"
version.workspace = true
edition.workspace = true
autobins = false

[lib]
name = "pyana_tests"
path = "src/main.rs"

[dependencies]
pyana-circuit = { path = "../circuit" }
pyana-turn = { path = "../turn" }
pyana-cell = { path = "../cell" }
token = { path = "../token", default-features = false, features = ["macaroon", "datalog"] }
blake3 = "1"
getrandom = { workspace = true }
proptest = { workspace = true }

[[example]]
name = "bench_summary"
path = "../benches/summary.rs"

[lints]
workspace = true
