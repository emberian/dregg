[package]
name = "pyana-wire"
version.workspace = true
edition.workspace = true

[features]
default = ["stark-verifier", "bridge"]
stark-verifier = ["pyana-circuit"]
bridge = ["pyana-bridge", "pyana-commit", "stark-verifier"]
dev = []

[dependencies]
tokio = { version = "1", features = ["full"] }
tokio-rustls = { version = "0.26" }
rustls-pemfile = { version = "2" }
postcard = { version = "1", features = ["use-std"] }
serde = { version = "1", features = ["derive"] }
blake3 = "1"
ed25519-dalek = { version = "2", features = ["std"] }
tracing = { workspace = true }
getrandom = { workspace = true }
pyana-circuit = { path = "../circuit", optional = true }
pyana-dsl-runtime = { path = "../pyana-dsl-runtime" }
pyana-bridge = { path = "../bridge", optional = true, features = ["test-utils"] }
pyana-token = { path = "../token", default-features = false, features = ["macaroon", "rand-deps"] }
pyana-commit = { path = "../commit", optional = true }
pyana-captp = { path = "../captp" }
pyana-cell = { path = "../cell" }
pyana-federation = { path = "../federation", default-features = false }
pyana-persist = { path = "../persist" }
pyana-turn = { path = "../turn" }
pyana-types = { path = "../types" }
pyana-dfa = { path = "../dfa" }

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }

[[bin]]
name = "pyana-network-demo"
path = "src/bin/demo.rs"
required-features = ["stark-verifier"]

[[bin]]
name = "cross_node_auth"
path = "src/bin/cross_node_auth.rs"
required-features = ["bridge"]

[[bench]]
name = "wire_bench"
harness = false

[lints]
workspace = true
